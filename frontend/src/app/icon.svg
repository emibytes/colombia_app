<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mi Selección Colombia">
  <!--
    Shield badge centered in a 100×100 square.
    Original shield: 100×120 → scaled 0.708, offset (14.6, 7.5)
    x_new = x*0.708 + 14.6 | y_new = y*0.708 + 7.5
  -->
  <rect width="100" height="100" fill="#07090E"/>

  <defs>
    <clipPath id="ic">
      <path d="M 23.1,7.5 L 76.9,7.5 Q 85.4,7.5 85.4,16 L 85.4,64.1 L 50,92.6 L 14.6,64.1 L 14.6,16 Q 14.6,7.5 23.1,7.5 Z"/>
    </clipPath>
  </defs>

  <!-- Yellow band (50% of shield height) -->
  <rect x="14.6" y="7.5"  width="70.8" height="42.5" fill="#FCD116" clip-path="url(#ic)"/>
  <!-- Blue band (25%) -->
  <rect x="14.6" y="50.0" width="70.8" height="21.2" fill="#003087" clip-path="url(#ic)"/>
  <!-- Red band (25%) -->
  <rect x="14.6" y="71.2" width="70.8" height="21.4" fill="#CE1126" clip-path="url(#ic)"/>

  <!-- Shield border -->
  <path d="M 23.1,7.5 L 76.9,7.5 Q 85.4,7.5 85.4,16 L 85.4,64.1 L 50,92.6 L 14.6,64.1 L 14.6,16 Q 14.6,7.5 23.1,7.5 Z"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.1"/>

  <!-- Checkmark: bold enough to read at 16px -->
  <polyline points="27.3,65.6 40.1,76.2 72.7,47.1"
            fill="none" stroke="white" stroke-width="7.8"
            stroke-linecap="round" stroke-linejoin="round"
            clip-path="url(#ic)"/>
</svg>
